<style>
.calendar-field {
  position: relative;
}

.calendar-field__control {
  position: relative;
}

.calendar-field__display {
  padding-right: 3rem;
  cursor: pointer;
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
}

.calendar-field__display[readonly] {
  caret-color: transparent;
}

.calendar-field__display:focus {
  cursor: pointer;
}

.calendar-field__toggle {
  position: absolute;
  top: 50%;
  right: 0.75rem;
  transform: translateY(-50%);
  border: 0;
  background: transparent;
  color: var(--slate-500);
  padding: 0;
  width: 1.25rem;
  height: 1.25rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.calendar-field__toggle:hover,
.calendar-field__toggle:focus-visible {
  color: var(--brand-600);
}

.calendar-popover {
  position: absolute;
  top: calc(100% + 0.5rem);
  left: 0;
  z-index: 40;
  width: min(18rem, 100%);
  background: var(--white);
  border: 1px solid var(--slate-200);
  border-radius: 1rem;
  box-shadow: 0 20px 45px rgba(15, 23, 42, 0.16);
  padding: 0.85rem;
}

.calendar-popover[hidden] {
  display: none;
}

.calendar-popover__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}

.calendar-popover__title {
  font-size: var(--text-sm);
  font-weight: var(--font-semibold);
  color: var(--slate-900);
}

.calendar-popover__nav {
  border: 0;
  background: var(--slate-100);
  color: var(--slate-700);
  width: 2rem;
  height: 2rem;
  border-radius: 999px;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
}

.calendar-popover__nav:hover,
.calendar-popover__nav:focus-visible {
  background: var(--brand-50);
  color: var(--brand-700);
}

.calendar-popover__weekdays,
.calendar-popover__days {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 0.25rem;
}

.calendar-popover__weekdays {
  margin-bottom: 0.35rem;
}

.calendar-popover__weekday {
  text-align: center;
  font-size: 0.7rem;
  font-weight: var(--font-semibold);
  color: var(--slate-400);
  text-transform: uppercase;
}

.calendar-popover__spacer,
.calendar-popover__day {
  height: 2.25rem;
}

.calendar-popover__day {
  border: 0;
  border-radius: 0.75rem;
  background: transparent;
  color: var(--slate-700);
  font-size: var(--text-sm);
  cursor: pointer;
}

.calendar-popover__day:hover,
.calendar-popover__day:focus-visible {
  background: var(--brand-50);
  color: var(--brand-700);
}

.calendar-popover__day.is-today {
  box-shadow: inset 0 0 0 1px var(--brand-300);
}

.calendar-popover__day.is-selected {
  background: var(--brand-600);
  color: var(--white);
}

.calendar-popover__footer {
  display: flex;
  justify-content: space-between;
  gap: 0.5rem;
  margin-top: 0.85rem;
}

.calendar-popover__action {
  border: 0;
  background: transparent;
  color: var(--brand-700);
  font-size: var(--text-xs);
  font-weight: var(--font-semibold);
  cursor: pointer;
  padding: 0.25rem 0;
}

.calendar-popover__action:hover,
.calendar-popover__action:focus-visible {
  color: var(--brand-800);
}

@media (max-width: 640px) {
  .calendar-popover {
    width: 100%;
  }
}
</style>

<script>
  (function() {
    if (window.initDoCalendarPickers) {
      return;
    }

    const monthFormatter = new Intl.DateTimeFormat('en-GB', {
      month: 'long',
      year: 'numeric',
    });

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function toIso(date) {
      return [date.getFullYear(), pad(date.getMonth() + 1), pad(date.getDate())].join('-');
    }

    function parseIso(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) {
        return null;
      }
      const [year, month, day] = value.split('-').map(Number);
      const parsed = new Date(year, month - 1, day);
      if (Number.isNaN(parsed.getTime())) {
        return null;
      }
      return parsed;
    }

    function toDisplay(value) {
      const parsed = parseIso(value);
      if (!parsed) {
        return '';
      }
      return [pad(parsed.getDate()), pad(parsed.getMonth() + 1), parsed.getFullYear()].join('/');
    }

    function shiftMonth(year, month, delta) {
      const shifted = new Date(year, month + delta, 1);
      return { year: shifted.getFullYear(), month: shifted.getMonth() };
    }

    function closePicker(root) {
      const popover = root.querySelector('[data-calendar-popover]');
      const display = root.querySelector('[data-calendar-display]');
      if (popover) {
        popover.hidden = true;
      }
      if (display) {
        display.setAttribute('aria-expanded', 'false');
      }
    }

    function updateValue(root, isoValue) {
      const hidden = root.querySelector('[data-calendar-value]');
      const display = root.querySelector('[data-calendar-display]');
      if (hidden) {
        hidden.value = isoValue || '';
      }
      if (display) {
        display.value = toDisplay(isoValue || '');
      }
    }

    function render(root) {
      const popover = root.querySelector('[data-calendar-popover]');
      const hidden = root.querySelector('[data-calendar-value]');
      if (!popover || !hidden) {
        return;
      }

      const selectedDate = parseIso(hidden.value);
      const today = new Date();
      const state = root._calendarState || {
        year: (selectedDate || today).getFullYear(),
        month: (selectedDate || today).getMonth(),
      };

      const monthStart = new Date(state.year, state.month, 1);
      const monthEnd = new Date(state.year, state.month + 1, 0);
      const leadingDays = monthStart.getDay();
      const days = [];

      for (let index = 0; index < leadingDays; index += 1) {
        days.push('<span class="calendar-popover__spacer" aria-hidden="true"></span>');
      }

      for (let day = 1; day <= monthEnd.getDate(); day += 1) {
        const current = new Date(state.year, state.month, day);
        const iso = toIso(current);
        const isSelected = hidden.value === iso;
        const isToday = toIso(today) === iso;
        const classes = ['calendar-popover__day'];
        if (isSelected) classes.push('is-selected');
        if (isToday) classes.push('is-today');
        days.push(
          '<button type="button" class="' + classes.join(' ') + '" data-calendar-day="' + iso + '">' +
          day +
          '</button>'
        );
      }

      popover.innerHTML = [
        '<div class="calendar-popover__header">',
        '  <button type="button" class="calendar-popover__nav" data-calendar-nav="-1" aria-label="Previous month">&#8249;</button>',
        '  <div class="calendar-popover__title">' + monthFormatter.format(monthStart) + '</div>',
        '  <button type="button" class="calendar-popover__nav" data-calendar-nav="1" aria-label="Next month">&#8250;</button>',
        '</div>',
        '<div class="calendar-popover__weekdays">',
        '  <span class="calendar-popover__weekday">Su</span>',
        '  <span class="calendar-popover__weekday">Mo</span>',
        '  <span class="calendar-popover__weekday">Tu</span>',
        '  <span class="calendar-popover__weekday">We</span>',
        '  <span class="calendar-popover__weekday">Th</span>',
        '  <span class="calendar-popover__weekday">Fr</span>',
        '  <span class="calendar-popover__weekday">Sa</span>',
        '</div>',
        '<div class="calendar-popover__days">',
        days.join(''),
        '</div>',
        '<div class="calendar-popover__footer">',
        '  <button type="button" class="calendar-popover__action" data-calendar-clear="1">Clear</button>',
        '  <button type="button" class="calendar-popover__action" data-calendar-today="1">Today</button>',
        '</div>'
      ].join('');

      popover.querySelectorAll('[data-calendar-day]').forEach(function(button) {
        button.addEventListener('click', function() {
          updateValue(root, button.getAttribute('data-calendar-day'));
          closePicker(root);
        });
      });

      popover.querySelectorAll('[data-calendar-nav]').forEach(function(button) {
        button.addEventListener('click', function() {
          root._calendarState = shiftMonth(state.year, state.month, Number(button.getAttribute('data-calendar-nav')));
          render(root);
        });
      });

      const todayButton = popover.querySelector('[data-calendar-today]');
      if (todayButton) {
        todayButton.addEventListener('click', function() {
          const iso = toIso(new Date());
          root._calendarState = parseIso(iso) ? { year: new Date().getFullYear(), month: new Date().getMonth() } : state;
          updateValue(root, iso);
          closePicker(root);
        });
      }

      const clearButton = popover.querySelector('[data-calendar-clear]');
      if (clearButton) {
        clearButton.addEventListener('click', function() {
          updateValue(root, '');
          closePicker(root);
        });
      }
    }

    function openPicker(root) {
      const popover = root.querySelector('[data-calendar-popover]');
      const hidden = root.querySelector('[data-calendar-value]');
      const display = root.querySelector('[data-calendar-display]');
      if (!popover || !display || !hidden) {
        return;
      }
      const selectedDate = parseIso(hidden.value);
      const basis = selectedDate || new Date();
      root._calendarState = { year: basis.getFullYear(), month: basis.getMonth() };
      render(root);
      popover.hidden = false;
      display.setAttribute('aria-expanded', 'true');
    }

    function setupPicker(root) {
      if (!root || root.dataset.calendarReady === '1') {
        return;
      }

      root.dataset.calendarReady = '1';
      const display = root.querySelector('[data-calendar-display]');
      const toggle = root.querySelector('[data-calendar-toggle]');
      const hidden = root.querySelector('[data-calendar-value]');

      updateValue(root, hidden ? hidden.value : '');

      function togglePicker() {
        const popover = root.querySelector('[data-calendar-popover]');
        if (popover && !popover.hidden) {
          closePicker(root);
        } else {
          openPicker(root);
        }
      }

      display?.addEventListener('click', togglePicker);
      display?.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ' || event.key === 'ArrowDown') {
          event.preventDefault();
          openPicker(root);
        }
      });
      toggle?.addEventListener('click', togglePicker);
    }

    document.addEventListener('click', function(event) {
      document.querySelectorAll('[data-calendar-root]').forEach(function(root) {
        if (!root.contains(event.target)) {
          closePicker(root);
        }
      });
    });

    window.initDoCalendarPickers = function(scope) {
      (scope || document).querySelectorAll('[data-calendar-root]').forEach(setupPicker);
    };
  })();
</script>
