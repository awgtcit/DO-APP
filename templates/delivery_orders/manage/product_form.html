{% extends base_template|default("base.html") %}
{% block title %}{{ 'Edit' if editing else 'New' }} Product — Delivery Orders{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ 'Edit Product' if editing else 'New Product' }}</h1>
</div>

<div class="card" style="max-width:600px;">
  <div class="card__body">
    <form method="POST"
          action="{{ url_for('do_management.product_edit', pk=pk) if editing else url_for('do_management.product_create') }}">

      <div class="form-group">
        <label class="form-label">Product ID *</label>
        <input type="text" name="product_id" class="form-input"
               value="{{ form.product_id|default('') }}" required
               {{ 'readonly' if editing else '' }}>
      </div>

      <div class="form-group">
        <label class="form-label">Name *</label>
        <input type="text" name="name" class="form-input"
               value="{{ form.name|default('') }}" required>
      </div>

      <div class="form-group">
        <label class="form-label">Unit of Measure</label>
        <select name="uom" class="form-select">
          <option value="">-- Select --</option>
          {% for u in ['MC', 'PC', 'KG', 'BOX', 'CTN', 'SET'] %}
          <option value="{{ u }}" {{ 'selected' if form.uom == u else '' }}>{{ u }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Market</label>
        <input type="text" name="market" class="form-input"
               value="{{ form.market|default('') }}">
      </div>

      <div class="form-group">
        <label class="form-label">Sales Manager</label>
        <select name="sales_manager" class="form-select">
          <option value="">-- Select --</option>
          {% for m in managers %}
          <option value="{{ m.EmpID }}"
                  {{ 'selected' if form.sales_manager|string == m.EmpID|string else '' }}>
            {{ m.FirstName }} {{ m.LastName }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div style="margin-top:var(--sp-5);display:flex;gap:var(--sp-2);">
        <button type="submit" class="btn btn-primary">
          {{ 'Update' if editing else 'Create' }}
        </button>
        <a href="{{ url_for('do_management.products') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
